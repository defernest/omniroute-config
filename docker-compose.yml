services:
  caddy:
    image: caddy:2.11-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "20130:20130"
      - "20131:20131"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 100m
    networks:
      - internal_network
  omniroute-prod:
    container_name: omniroute-prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OMNIROUTE_IMAGE: diegosouzapw/omniroute:3.6.6
    image: omniroute-custom:3.6.6
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-${PORT:-20128}}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
    expose:
      - "20128"
      - "20129"
    networks:
      - internal_network
    volumes:
      - omniroute-prod-data:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
networks:
  internal_network:
    driver: bridge
volumes:
  caddy_data:
  caddy_config:
  omniroute-prod-data:
